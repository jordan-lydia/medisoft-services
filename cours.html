<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medisoft - Gestion des Cours</title>
    <link rel="icon" type="image/png" href="Logo de medisoft services.PNG">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a192f;
            --accent: #00bcd4;
            --accent-dark: #00a0b4;
            --cours-green: #10b981;
            --cours-green-dark: #059669;
            --light-bg: #f8fafc;
            --white: #ffffff;
            --text-main: #333333;
            --text-muted: #64748b;
            --shadow-md: 0 10px 30px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--light-bg); padding: 20px; }
        
        .admin-container { max-width: 1400px; margin: 0 auto; background: var(--white); border-radius: 30px; box-shadow: var(--shadow-md); overflow: hidden; }
        .admin-header { background: var(--primary); padding: 25px 30px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .admin-header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 12px; }
        .admin-header h1 i { color: var(--accent); }
        .btn-back { background: rgba(255,255,255,0.15); color: white; padding: 10px 20px; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; text-decoration: none; font-weight: 500; }
        .btn-back:hover { background: rgba(255,255,255,0.25); }

        .admin-body { padding: 30px; }
        .admin-toolbar { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; }
        .btn-add { background: var(--cours-green); color: white; padding: 12px 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .btn-add:hover { background: var(--cours-green-dark); transform: translateY(-2px); }
        .btn-refresh { background: var(--accent); color: white; padding: 12px 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .btn-refresh:hover { background: var(--accent-dark); transform: translateY(-2px); }

        table { width: 100%; border-collapse: collapse; background: var(--light-bg); border-radius: 16px; overflow: hidden; }
        th, td { padding: 14px 18px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: var(--primary); color: white; font-weight: 600; }
        tr:hover { background: rgba(0,188,212,0.05); }
        .btn-edit { background: var(--accent); color: white; padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; margin: 0 3px; }
        .btn-edit:hover { background: var(--accent-dark); }
        .btn-delete { background: #dc2626; color: white; padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; margin: 0 3px; }
        .btn-delete:hover { background: #b91c1c; }
        .btn-view { background: #8b5cf6; color: white; padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; margin: 0 3px; }
        .btn-view:hover { background: #7c3aed; }
        .badge-cours { background: rgba(16,185,129,0.15); color: var(--cours-green); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: inline-block; }

        .empty-state { text-align: center; padding: 60px; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; opacity: 0.3; margin-bottom: 15px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; border-radius: 24px; padding: 35px; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
        .modal-content h2 { color: #004a99; margin-bottom: 25px; border-left: 4px solid var(--accent); padding-left: 15px; }
        .modal-content label { font-weight: 600; color: #004a99; display: block; margin-bottom: 6px; font-size: 0.85rem; }
        .modal-content input, .modal-content textarea, .modal-content select { width: 100%; padding: 12px 16px; margin-bottom: 18px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 0.95rem; transition: 0.3s; background: var(--light-bg); }
        .modal-content input:focus, .modal-content textarea:focus, .modal-content select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0,188,212,0.1); background: white; }
        .modal-content textarea { resize: vertical; min-height: 80px; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }
        .modal-buttons .btn-save { background: var(--cours-green); color: white; padding: 12px 30px; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .modal-buttons .btn-save:hover { background: var(--cours-green-dark); }
        .modal-buttons .btn-cancel { background: #e2e8f0; color: #475569; padding: 12px 30px; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .modal-buttons .btn-cancel:hover { background: #cbd5e1; }

        .programme-editor { background: var(--light-bg); border-radius: 12px; padding: 20px; margin-bottom: 18px; }
        .programme-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .programme-item input { flex: 1; margin-bottom: 0; }
        .btn-remove-item { background: #dc2626; color: white; border: none; border-radius: 8px; padding: 8px 12px; cursor: pointer; transition: 0.3s; }
        .btn-remove-item:hover { background: #b91c1c; }
        .btn-add-item { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-add-item:hover { background: var(--accent-dark); }

        .notification { position: fixed; top: 20px; right: 20px; background: white; padding: 15px 25px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); transform: translateX(400px); transition: 0.3s; z-index: 3000; border-left: 4px solid var(--accent); font-weight: 500; }

        @media (max-width: 768px) {
            .admin-body { padding: 15px; }
            table { font-size: 0.8rem; }
            th, td { padding: 8px 10px; }
            .modal-content { padding: 20px; }
            .admin-header { flex-direction: column; align-items: stretch; text-align: center; }
            .admin-header h1 { justify-content: center; }
            .btn-back { justify-content: center; }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-header">
        <h1><i class="fas fa-graduation-cap"></i> Gestion des Cours</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <a href="cours.html" class="btn-back"><i class="fas fa-arrow-left"></i> Voir les cours</a>
            <a href="index.html" class="btn-back"><i class="fas fa-home"></i> Accueil</a>
        </div>
    </div>
    <div class="admin-body">
        <div class="admin-toolbar">
            <button class="btn-add" onclick="openAddModal()"><i class="fas fa-plus"></i> Ajouter un cours</button>
            <button class="btn-refresh" onclick="loadCoursAdmin()"><i class="fas fa-sync"></i> Rafraîchir</button>
        </div>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Titre</th>
                        <th>Niveau</th>
                        <th>Durée</th>
                        <th>Programme</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="coursTableBody">
                    <tr><td colspan="5" class="empty-state"><i class="fas fa-spinner fa-spin"></i> Chargement...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal-overlay" id="coursModal">
    <div class="modal-content">
        <h2 id="modalTitle">Ajouter un cours</h2>
        <input type="hidden" id="editId">
        
        <label><i class="fas fa-heading"></i> Titre du cours *</label>
        <input type="text" id="coursTitre" placeholder="Ex: Administration Réseaux et Sécurité">
        
        <label><i class="fas fa-align-left"></i> Description</label>
        <textarea id="coursDescription" placeholder="Description détaillée du cours..." rows="3"></textarea>
        
        <label><i class="fas fa-layer-group"></i> Niveau</label>
        <select id="coursNiveau">
            <option value="Débutant">Débutant</option>
            <option value="Intermédiaire" selected>Intermédiaire</option>
            <option value="Avancé">Avancé</option>
            <option value="Tous niveaux">Tous niveaux</option>
        </select>
        
        <label><i class="fas fa-clock"></i> Durée</label>
        <input type="text" id="coursDuree" placeholder="Ex: 3 mois, 40 heures...">
        
        <label><i class="fas fa-check-double"></i> Prérequis</label>
        <input type="text" id="coursPrerequis" placeholder="Ex: Bases en informatique">
        
        <label><i class="fas fa-bullseye"></i> Objectifs</label>
        <input type="text" id="coursObjectifs" placeholder="Ex: Maîtriser l'administration réseau">
        
        <label><i class="fas fa-icons"></i> Icône (FontAwesome)</label>
        <input type="text" id="coursIcon" placeholder="Ex: fa-server" value="fa-graduation-cap">
        
        <label><i class="fas fa-list-ul"></i> Programme d'enseignement</label>
        <div class="programme-editor" id="programmeEditor">
            <div id="programmeList"></div>
            <button class="btn-add-item" onclick="addProgrammeItem()"><i class="fas fa-plus"></i> Ajouter un module</button>
        </div>
        
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeModal()">Annuler</button>
            <button class="btn-save" onclick="saveCours()"><i class="fas fa-save"></i> Enregistrer</button>
        </div>
    </div>
</div>

<div class="notification" id="notification"><span id="notificationMessage"></span></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Configuration Supabase - À remplacer par vos propres identifiants
    const supabaseUrl = 'https://votre-projet.supabase.co';
    const supabaseKey = 'votre-cle-anon';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let coursList = [];
    let programmeItems = [];

    function showNotification(message, isError = false) {
        const notification = document.getElementById('notification');
        const msgEl = document.getElementById('notificationMessage');
        msgEl.textContent = message;
        notification.style.transform = 'translateX(0)';
        notification.style.borderLeftColor = isError ? '#dc2626' : '#10b981';
        setTimeout(() => { notification.style.transform = 'translateX(400px)'; }, 3000);
    }

    async function loadCoursAdmin() {
        try {
            const { data, error } = await supabase
                .from('cours')
                .select('*')
                .order('titre', { ascending: true });

            if (error) throw error;
            
            coursList = data || [];
            renderTable();
        } catch (error) {
            console.error('Erreur:', error);
            document.getElementById('coursTableBody').innerHTML = `
                <tr><td colspan="5" class="empty-state">
                    <i class="fas fa-exclamation-triangle" style="color: #dc2626;"></i>
                    <p>Erreur de chargement. Vérifiez votre connexion à Supabase.</p>
                    <button onclick="loadCoursAdmin()" style="margin-top:10px; padding:8px 20px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer;">Réessayer</button>
                </td></tr>
            `;
        }
    }

    function renderTable() {
        const tbody = document.getElementById('coursTableBody');
        if (!coursList || coursList.length === 0) {
            tbody.innerHTML = `
                <tr><td colspan="5" class="empty-state">
                    <i class="fas fa-book-open"></i>
                    <p>Aucun cours disponible. Créez votre premier cours !</p>
                </td></tr>
            `;
            return;
        }

        tbody.innerHTML = coursList.map(c => {
            const programmeCount = (c.programme || []).length;
            return `
                <tr>
                    <td><strong>${escapeHtml(c.titre)}</strong></td>
                    <td><span class="badge-cours">${escapeHtml(c.niveau || 'Non défini')}</span></td>
                    <td>${escapeHtml(c.duree || 'Non définie')}</td>
                    <td>${programmeCount} module${programmeCount > 1 ? 's' : ''}</td>
                    <td>
                        <button class="btn-view" onclick="viewCours('${c.id}')"><i class="fas fa-eye"></i></button>
                        <button class="btn-edit" onclick="openEditModal('${c.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-delete" onclick="deleteCours('${c.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function viewCours(id) {
        window.open(`cours.html#cours-${id}`, '_blank');
    }

    function openAddModal() {
        document.getElementById('modalTitle').textContent = 'Ajouter un cours';
        document.getElementById('editId').value = '';
        document.getElementById('coursTitre').value = '';
        document.getElementById('coursDescription').value = '';
        document.getElementById('coursNiveau').value = 'Intermédiaire';
        document.getElementById('coursDuree').value = '';
        document.getElementById('coursPrerequis').value = '';
        document.getElementById('coursObjectifs').value = '';
        document.getElementById('coursIcon').value = 'fa-graduation-cap';
        programmeItems = [];
        renderProgrammeItems();
        document.getElementById('coursModal').classList.add('active');
    }

    function openEditModal(id) {
        const cours = coursList.find(c => c.id === id);
        if (!cours) return;

        document.getElementById('modalTitle').textContent = 'Modifier le cours';
        document.getElementById('editId').value = id;
        document.getElementById('coursTitre').value = cours.titre || '';
        document.getElementById('coursDescription').value = cours.description || '';
        document.getElementById('coursNiveau').value = cours.niveau || 'Intermédiaire';
        document.getElementById('coursDuree').value = cours.duree || '';
        document.getElementById('coursPrerequis').value = cours.prerequis || '';
        document.getElementById('coursObjectifs').value = cours.objectifs || '';
        document.getElementById('coursIcon').value = cours.icon || 'fa-graduation-cap';
        programmeItems = cours.programme || [];
        renderProgrammeItems();
        document.getElementById('coursModal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('coursModal').classList.remove('active');
    }

    function addProgrammeItem(value = '') {
        programmeItems.push(value || '');
        renderProgrammeItems();
    }

    function removeProgrammeItem(index) {
        programmeItems.splice(index, 1);
        renderProgrammeItems();
    }

    function renderProgrammeItems() {
        const container = document.getElementById('programmeList');
        container.innerHTML = programmeItems.map((item, index) => `
            <div class="programme-item">
                <input type="text" value="${escapeHtml(item)}" 
                    onchange="updateProgrammeItem(${index}, this.value)"
                    placeholder="Module ${index + 1}">
                <button class="btn-remove-item" onclick="removeProgrammeItem(${index})"><i class="fas fa-times"></i></button>
            </div>
        `).join('');
    }

    function updateProgrammeItem(index, value) {
        programmeItems[index] = value;
    }

    async function saveCours() {
        const id = document.getElementById('editId').value;
        const titre = document.getElementById('coursTitre').value.trim();
        if (!titre) { showNotification('Le titre est requis', true); return; }

        const programme = programmeItems.filter(item => item.trim() !== '');

        const data = {
            titre: titre,
            description: document.getElementById('coursDescription').value.trim(),
            niveau: document.getElementById('coursNiveau').value,
            duree: document.getElementById('coursDuree').value.trim(),
            prerequis: document.getElementById('coursPrerequis').value.trim(),
            objectifs: document.getElementById('coursObjectifs').value.trim(),
            icon: document.getElementById('coursIcon').value.trim() || 'fa-graduation-cap',
            programme: programme,
            updated_at: new Date().toISOString()
        };

        try {
            if (id) {
                const { error } = await supabase
                    .from('cours')
                    .update(data)
                    .eq('id', id);
                if (error) throw error;
                showNotification('Cours modifié avec succès !');
            } else {
                const { error } = await supabase
                    .from('cours')
                    .insert([{ ...data, created_at: new Date().toISOString() }]);
                if (error) throw error;
                showNotification('Cours ajouté avec succès !');
            }
            closeModal();
            loadCoursAdmin();
        } catch (error) {
            console.error('Erreur:', error);
            showNotification('Erreur lors de l\'enregistrement: ' + error.message, true);
        }
    }

    async function deleteCours(id) {
        if (!confirm('Supprimer définitivement ce cours ?')) return;
        try {
            const { error } = await supabase
                .from('cours')
                .delete()
                .eq('id', id);
            if (error) throw error;
            showNotification('Cours supprimé');
            loadCoursAdmin();
        } catch (error) {
            console.error('Erreur:', error);
            showNotification('Erreur lors de la suppression', true);
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            return m;
        });
    }

    window.addEventListener('load', loadCoursAdmin);

    // Rendre les fonctions globales
    window.openAddModal = openAddModal;
    window.openEditModal = openEditModal;
    window.closeModal = closeModal;
    window.addProgrammeItem = addProgrammeItem;
    window.removeProgrammeItem = removeProgrammeItem;
    window.updateProgrammeItem = updateProgrammeItem;
    window.saveCours = saveCours;
    window.deleteCours = deleteCours;
    window.viewCours = viewCours;
    window.loadCoursAdmin = loadCoursAdmin;
</script>

</body>
</html>
