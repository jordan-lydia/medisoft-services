<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medisoft Services - Installation Firebase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #0a192f 0%, #1a3a5f 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        
        .content {
            padding: 30px;
        }
        
        .step {
            margin-bottom: 25px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 10px;
            border-left: 4px solid #00bcd4;
        }
        
        .step h3 {
            color: #0a192f;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        
        .step p {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .step code {
            background: #e2e8f0;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.85rem;
            display: inline-block;
            margin-top: 5px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #0a192f;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #00bcd4;
        }
        
        .btn {
            background: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00bcd4, #0097a7);
            width: 0%;
            transition: width 0.3s;
            border-radius: 2px;
        }
        
        .credentials-box {
            background: #f1f5f9;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid #e2e8f0;
        }
        
        .credentials-box h4 {
            color: #0a192f;
            margin-bottom: 10px;
        }
        
        .credentials-box p {
            font-family: monospace;
            font-size: 0.85rem;
            margin: 5px 0;
            word-break: break-all;
        }
        
        .copy-btn {
            background: #e2e8f0;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 10px;
        }
        
        .copy-btn:hover {
            background: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Medisoft Services</h1>
            <p>Configuration automatique de Firebase</p>
        </div>
        
        <div class="content">
            <div class="step">
                <h3>📋 Étape 1 : Vérification de la configuration</h3>
                <p>Vérification de la connexion à Firebase...</p>
            </div>
            
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div id="statusMessages"></div>
            
            <div class="credentials-box" id="credentialsBox" style="display: none;">
                <h4>🔐 Identifiants Administrateur</h4>
                <p><strong>Email:</strong> <span id="adminEmail">admin@medisoft.cd</span> 
                    <button class="copy-btn" onclick="copyToClipboard('admin@medisoft.cd')">Copier</button>
                </p>
                <p><strong>Mot de passe:</strong> <span id="adminPassword">MedisoftAdmin2024!</span>
                    <button class="copy-btn" onclick="copyToClipboard('MedisoftAdmin2024!')">Copier</button>
                </p>
                <p style="font-size: 0.8rem; margin-top: 10px;">⚠️ Conservez ces identifiants précieusement</p>
            </div>
            
            <button class="btn" id="initBtn" onclick="initializeFirebase()">
                🔧 Initialiser Firebase automatiquement
            </button>
            
            <div id="continueBtn" style="display: none; margin-top: 15px;">
                <button class="btn" onclick="goToSite()" style="background: linear-gradient(135deg, #28a745, #20c997);">
                    ✅ Accéder au site Medisoft
                </button>
            </div>
        </div>
    </div>
    
    <script type="module">
        // Import Firebase modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB72qi05cOLYJBhT-y1DN4aO0IlLGpOVuE",
            authDomain: "medisoft-services.firebaseapp.com",
            projectId: "medisoft-services",
            storageBucket: "medisoft-services.firebasestorage.app",
            messagingSenderId: "789559444249",
            appId: "1:789559444249:web:59a9c61978c14624b7fb88",
            measurementId: "G-MDFCKC4NJR"
        };
        
        let app, db, storage, auth;
        let initialized = false;
        
        // Fonction pour afficher le statut
        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('statusMessages');
            const status = document.createElement('div');
            status.className = `status ${type}`;
            status.innerHTML = message;
            statusDiv.appendChild(status);
            
            // Auto-scroll
            status.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            
            // Supprimer après 5 secondes pour les succès/infos
            if (type !== 'error') {
                setTimeout(() => {
                    status.remove();
                }, 5000);
            }
        }
        
        // Mettre à jour la barre de progression
        function updateProgress(percent) {
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            progressBar.style.display = 'block';
            progressFill.style.width = percent + '%';
        }
        
        // Données par défaut
        const defaultData = {
            services: [
                {
                    title: "Conseil Informatique",
                    description: "Audit technique, stratégie IT et accompagnement dans vos choix technologiques.",
                    icon: "fa-lightbulb",
                    features: ["Audit complet", "Stratégie digitale", "Accompagnement"],
                    order: 1
                },
                {
                    title: "Maintenance & Administration Réseaux",
                    description: "Gestion complète de votre infrastructure réseau.",
                    icon: "fa-server",
                    features: ["Supervision 24/7", "Sécurité réseau", "Support technique"],
                    order: 2
                },
                {
                    title: "Installation de Caméras de Surveillance",
                    description: "Solutions de vidéosurveillance professionnelles.",
                    icon: "fa-camera",
                    features: ["Caméras HD", "Vision nocturne", "Accès à distance"],
                    order: 3
                },
                {
                    title: "Systèmes Embarqués",
                    description: "Conception de solutions sur mesure pour l'IoT.",
                    icon: "fa-microchip",
                    features: ["Prototypage rapide", "Firmware custom", "IoT & Capteurs"],
                    order: 4
                }
            ],
            direction: [
                {
                    name: "Msc LUKIS LUBABA",
                    title: "Manager Principal",
                    degree: "Master en Informatique des Réseaux",
                    experience: "7+ ans d'expérience",
                    quote: "Expert en architecture réseau et sécurité informatique",
                    order: 1
                },
                {
                    name: "Ir JORDAN MUKALAMUSI",
                    title: "Manager Régional",
                    degree: "Master en Génie Informatique",
                    experience: "5+ ans d'expérience",
                    quote: "Spécialiste en systèmes embarqués et IoT",
                    order: 2
                },
                {
                    name: "JOCELINE TWITE",
                    title: "Secrétaire Principal",
                    degree: "Ir en Systèmes Informatiques",
                    experience: "3+ ans d'expérience",
                    quote: "Experte en gestion de systèmes et administration IT",
                    order: 3
                }
            ],
            partners: [
                {
                    name: "Mwalimu Logistics",
                    website: "https://mwalimulogistics.com/",
                    description: "Solutions logistiques intégrées",
                    order: 1
                },
                {
                    name: "Thiermar Company",
                    website: "https://www.thiermarcompany.com/accueil",
                    description: "Ingénierie et services",
                    order: 2
                },
                {
                    name: "Kamoto Copper Company",
                    website: "https://www.kamotocoppercompany.com/",
                    description: "Exploitation minière",
                    order: 3
                },
                {
                    name: "Malabar Group",
                    website: "https://www.malabar-group.com/",
                    description: "Commerce et distribution",
                    order: 4
                }
            ],
            teams: [
                {
                    name: "Systèmes Embarqués",
                    description: "Notre équipe spécialisée en IoT",
                    tags: ["5 experts", "IoT"],
                    order: 1
                },
                {
                    name: "Équipe Technique",
                    description: "Nos experts à votre service",
                    tags: ["12 ingénieurs", "24/7 Support"],
                    order: 2
                }
            ],
            stats: [
                { label: "Projets réalisés", value: 35, order: 1 },
                { label: "Clients satisfaits", value: 20, order: 2 },
                { label: "Années d'expérience", value: 5, order: 3 },
                { label: "Support 7j/7", value: 24, order: 4 }
            ]
        };
        
        // Initialiser Firebase
        async function initializeFirebase() {
            const btn = document.getElementById('initBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Initialisation en cours...';
            
            try {
                // Étape 1: Initialiser l'app Firebase
                updateProgress(10);
                showStatus('🔧 Initialisation de Firebase...', 'info');
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                storage = getStorage(app);
                auth = getAuth(app);
                updateProgress(20);
                showStatus('✅ Firebase initialisé avec succès', 'success');
                
                // Étape 2: Vérifier et créer l'utilisateur admin
                updateProgress(30);
                showStatus('👤 Vérification de l\'utilisateur administrateur...', 'info');
                
                const adminEmail = "admin@medisoft.cd";
                const adminPassword = "MedisoftAdmin2024!";
                
                try {
                    // Vérifier si l'utilisateur existe déjà
                    const signInMethods = await fetchSignInMethodsForEmail(auth, adminEmail);
                    
                    if (signInMethods.length === 0) {
                        showStatus('📝 Création de l\'utilisateur administrateur...', 'info');
                        const userCredential = await createUserWithEmailAndPassword(auth, adminEmail, adminPassword);
                        showStatus('✅ Utilisateur administrateur créé avec succès', 'success');
                        
                        // Stocker les infos admin dans Firestore
                        await setDoc(doc(db, "admin", "user"), {
                            email: adminEmail,
                            role: "admin",
                            createdAt: new Date().toISOString(),
                            uid: userCredential.user.uid
                        });
                    } else {
                        showStatus('✅ Utilisateur administrateur déjà existant', 'success');
                    }
                } catch (authError) {
                    if (authError.code === 'auth/configuration-not-found') {
                        showStatus('⚠️ L\'authentification Firebase n\'est pas activée. Veuillez activer l\'authentification par Email/Mot de passe dans la console Firebase.', 'error');
                        btn.disabled = false;
                        btn.innerHTML = '🔧 Initialiser Firebase automatiquement';
                        return;
                    }
                    throw authError;
                }
                
                updateProgress(40);
                
                // Étape 3: Créer les collections Firestore avec données par défaut
                updateProgress(50);
                showStatus('📚 Création des collections Firestore...', 'info');
                
                const collections = [
                    { name: 'services', data: defaultData.services },
                    { name: 'direction', data: defaultData.direction },
                    { name: 'partners', data: defaultData.partners },
                    { name: 'teams', data: defaultData.teams },
                    { name: 'stats', data: defaultData.stats }
                ];
                
                for (let i = 0; i < collections.length; i++) {
                    const collection = collections[i];
                    showStatus(`📁 Création de la collection "${collection.name}"...`, 'info');
                    
                    // Vérifier si la collection a déjà des données
                    const querySnapshot = await getDocs(collection(db, collection.name));
                    
                    if (querySnapshot.empty) {
                        // Ajouter les données par défaut
                        for (const item of collection.data) {
                            await setDoc(doc(collection(db, collection.name)), {
                                ...item,
                                createdAt: new Date().toISOString(),
                                updatedAt: new Date().toISOString()
                            });
                        }
                        showStatus(`✅ Collection "${collection.name}" créée avec ${collection.data.length} documents`, 'success');
                    } else {
                        showStatus(`✅ Collection "${collection.name}" existe déjà (${querySnapshot.size} documents)`, 'success');
                    }
                    
                    updateProgress(50 + (i + 1) * 10);
                }
                
                // Étape 4: Créer la collection des réalisations
                updateProgress(85);
                showStatus('🎬 Création de la collection des réalisations...', 'info');
                
                const realisationsQuery = await getDocs(collection(db, "realisations"));
                if (realisationsQuery.empty) {
                    // Ajouter quelques réalisations par défaut
                    const defaultRealisations = [
                        {
                            title: "Installation de Caméras de Surveillance",
                            description: "Installation professionnelle de systèmes de vidéosurveillance pour entreprise",
                            type: "surveillance",
                            mediaType: "photo",
                            tags: ["Surveillance", "Sécurité", "HD"],
                            order: 1,
                            createdAt: new Date().toISOString()
                        },
                        {
                            title: "Maintenance & Administration Réseaux",
                            description: "Intervention sur infrastructure réseau d'entreprise",
                            type: "reseau",
                            mediaType: "photo",
                            tags: ["Réseau", "Maintenance", "Administration"],
                            order: 2,
                            createdAt: new Date().toISOString()
                        },
                        {
                            title: "Systèmes Embarqués IoT",
                            description: "Développement de systèmes embarqués pour l'IoT industriel",
                            type: "embarque",
                            mediaType: "photo",
                            tags: ["Embarqué", "Développement", "IoT"],
                            order: 3,
                            createdAt: new Date().toISOString()
                        }
                    ];
                    
                    for (const real of defaultRealisations) {
                        await setDoc(doc(collection(db, "realisations")), real);
                    }
                    showStatus('✅ Collection "realisations" créée avec 3 documents', 'success');
                } else {
                    showStatus('✅ Collection "realisations" existe déjà', 'success');
                }
                
                updateProgress(95);
                
                // Étape 5: Stocker la configuration Firebase localement
                localStorage.setItem('firebase_initialized', 'true');
                localStorage.setItem('firebase_config', JSON.stringify(firebaseConfig));
                
                updateProgress(100);
                
                // Afficher les identifiants
                document.getElementById('credentialsBox').style.display = 'block';
                
                showStatus('🎉 Initialisation terminée avec succès !', 'success');
                showStatus('🔐 Les identifiants administrateur sont affichés ci-dessous. Conservez-les précieusement.', 'info');
                
                btn.style.display = 'none';
                document.getElementById('continueBtn').style.display = 'block';
                
                initialized = true;
                
            } catch (error) {
                console.error('Erreur détaillée:', error);
                showStatus(`❌ Erreur: ${error.message}`, 'error');
                
                if (error.code === 'auth/configuration-not-found') {
                    showStatus(`
                        <strong>Comment résoudre cette erreur :</strong><br><br>
                        1. Allez sur <a href="https://console.firebase.google.com/project/medisoft-services/authentication" target="_blank">Firebase Console > Authentication</a><br>
                        2. Cliquez sur "Commencer" ou "Get started"<br>
                        3. Activez la méthode de connexion "Email/Mot de passe"<br>
                        4. Cliquez sur "Enregistrer"<br>
                        5. Revenez ici et réessayez
                    `, 'error');
                }
                
                btn.disabled = false;
                btn.innerHTML = '🔧 Initialiser Firebase automatiquement';
            }
        }
        
        // Fonction pour copier dans le presse-papier
        window.copyToClipboard = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                showStatus('✅ Identifiant copié dans le presse-papier', 'success');
            });
        };
        
        // Redirection vers le site principal
        window.goToSite = function() {
            window.location.href = 'index.html';
        };
        
        // Vérifier si déjà initialisé
        async function checkInitialization() {
            try {
                const isInitialized = localStorage.getItem('firebase_initialized');
                if (isInitialized === 'true') {
                    document.getElementById('continueBtn').style.display = 'block';
                    document.getElementById('initBtn').style.display = 'none';
                    document.getElementById('credentialsBox').style.display = 'block';
                    showStatus('✅ Firebase est déjà initialisé. Vous pouvez accéder au site.', 'success');
                }
            } catch (e) {
                console.log('Vérification ignorée');
            }
        }
        
        checkInitialization();
        
        // Exposer la fonction globalement
        window.initializeFirebase = initializeFirebase;
    </script>
</body>
</html>
