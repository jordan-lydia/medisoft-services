<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer compte Admin Medisoft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a192f, #1a3a5f);
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h2 {
            color: #004a99;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #00bcd4;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00bcd4;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00a0b4;
            transform: translateY(-2px);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            text-align: center;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .note {
            margin-top: 20px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #666;
        }

        .note strong {
            color: #00bcd4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Créer un compte Administrateur</h2>
        <div class="subtitle">Medisoft Services - Panneau d'administration</div>
        
        <div class="input-group">
            <label>📧 Email administrateur</label>
            <input type="email" id="adminEmail" placeholder="admin@medisoft.com" value="admin@medisoft.com">
        </div>
        
        <div class="input-group">
            <label>🔑 Mot de passe</label>
            <input type="password" id="adminPassword" placeholder="Choisissez un mot de passe sécurisé">
        </div>
        
        <div class="input-group">
            <label>✓ Confirmer le mot de passe</label>
            <input type="password" id="confirmPassword" placeholder="Répétez le mot de passe">
        </div>
        
        <button onclick="createAdmin()">Créer le compte admin</button>
        
        <div id="message" class="message"></div>
        
        <div class="note">
            <strong>📌 Note importante :</strong><br>
            • Le mot de passe doit contenir au moins 6 caractères<br>
            • Conservez ces identifiants en sécurité<br>
            • Après création, connectez-vous à <strong>admin.html</strong>
        </div>
    </div>

    <script type="module">
        import { auth, createUserWithEmailAndPassword } from './firebase-config.js';
        
        window.createAdmin = async () => {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            
            // Validation
            if (!email || !password) {
                showMessage('Veuillez remplir tous les champs', 'error');
                return;
            }
            
            if (password !== confirm) {
                showMessage('Les mots de passe ne correspondent pas', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Le mot de passe doit contenir au moins 6 caractères', 'error');
                return;
            }
            
            try {
                // Créer l'utilisateur
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                showMessage(`
                    ✅ Compte administrateur créé avec succès !<br><br>
                    📧 Email: ${email}<br>
                    🔑 Mot de passe: ${'*'.repeat(password.length)}<br><br>
                    👉 Vous pouvez maintenant vous connecter à <strong>admin.html</strong>
                `, 'success');
                
                // Réinitialiser le formulaire
                document.getElementById('adminPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                
                // Afficher les identifiants dans la console
                console.log('✅ Admin créé:', { email, password });
                
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    showMessage('⚠️ Cet email est déjà utilisé. Essayez de vous connecter directement.', 'error');
                } else if (error.code === 'auth/weak-password') {
                    showMessage('⚠️ Mot de passe trop faible. Utilisez au moins 6 caractères.', 'error');
                } else {
                    showMessage('❌ Erreur: ' + error.message, 'error');
                }
                console.error('Erreur:', error);
            }
        };
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = msg;
            messageDiv.className = `message ${type}`;
            
            // Auto-cacher après 5 secondes pour les erreurs
            if (type === 'error') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>
</html>
