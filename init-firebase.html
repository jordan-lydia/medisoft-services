<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initialisation Firebase - Medisoft Services</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a192f 0%, #1a3a5f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00bcd4, #008c9e);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .logo i {
            font-size: 40px;
            color: white;
        }
        
        h1 {
            color: #0a192f;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        
        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
        }
        
        .status-card {
            background: #f8fafc;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .status-label {
            font-weight: 600;
            color: #0a192f;
        }
        
        .status-value {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .success {
            color: #10b981;
        }
        
        .error {
            color: #ef4444;
        }
        
        .warning {
            color: #f59e0b;
        }
        
        .loading {
            color: #00bcd4;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .btn {
            background: linear-gradient(135deg, #00bcd4, #008c9e);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 20px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,188,212,0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #64748b;
            margin-left: 10px;
        }
        
        .info-box {
            background: #e0f2fe;
            border-left: 4px solid #00bcd4;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }
        
        .info-box p {
            color: #0c4a6e;
            margin: 5px 0;
            font-size: 0.9rem;
        }
        
        .credentials {
            background: #f1f5f9;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 0.9rem;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,188,212,0.3);
            border-radius: 50%;
            border-top-color: #00bcd4;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00bcd4, #008c9e);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1>Initialisation Firebase</h1>
        <p class="subtitle">Configuration automatique de l'espace administrateur</p>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="status-card">
            <div class="status-item">
                <span class="status-label">Firebase Connection</span>
                <span class="status-value" id="connectionStatus">
                    <span class="spinner"></span>
                    <span>Connexion...</span>
                </span>
            </div>
            <div class="status-item">
                <span class="status-label">Authentication Service</span>
                <span class="status-value" id="authStatus">
                    <span class="spinner"></span>
                    <span>Vérification...</span>
                </span>
            </div>
            <div class="status-item">
                <span class="status-label">Firestore Database</span>
                <span class="status-value" id="dbStatus">
                    <span class="spinner"></span>
                    <span>Vérification...</span>
                </span>
            </div>
            <div class="status-item">
                <span class="status-label">Admin Account</span>
                <span class="status-value" id="adminStatus">
                    <span class="spinner"></span>
                    <span>Vérification...</span>
                </span>
            </div>
        </div>
        
        <div id="resultArea"></div>
        
        <div style="margin-top: 20px;">
            <button class="btn" id="initBtn" onclick="initializeFirebase()">
                <i class="fas fa-rocket"></i> Initialiser Firebase
            </button>
            <button class="btn btn-secondary" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i> Rafraîchir
            </button>
        </div>
    </div>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC4lzLqXO2v0MWFQHdEw57KdX5el7e9Vu0",
            authDomain: "medisoft-bd.firebaseapp.com",
            projectId: "medisoft-bd",
            storageBucket: "medisoft-bd.firebasestorage.app",
            messagingSenderId: "845735954495",
            appId: "1:845735954495:web:9adc73d081a0f39d04d08a"
        };
        
        // Admin credentials
        const ADMIN_EMAIL = "admin@medisoft.com";
        const ADMIN_PASSWORD = "Admin123456";
        
        let app, auth, db;
        let initialized = false;
        
        // Update progress
        function updateProgress(percent) {
            const fill = document.getElementById('progressFill');
            if (fill) fill.style.width = percent + '%';
        }
        
        // Update status with icon
        function updateStatus(elementId, status, message) {
            const element = document.getElementById(elementId);
            if (!element) return;
            
            let icon = '';
            let colorClass = '';
            
            switch(status) {
                case 'success':
                    icon = '<i class="fas fa-check-circle" style="color: #10b981;"></i>';
                    colorClass = 'success';
                    break;
                case 'error':
                    icon = '<i class="fas fa-times-circle" style="color: #ef4444;"></i>';
                    colorClass = 'error';
                    break;
                case 'warning':
                    icon = '<i class="fas fa-exclamation-triangle" style="color: #f59e0b;"></i>';
                    colorClass = 'warning';
                    break;
                case 'loading':
                    icon = '<span class="spinner"></span>';
                    colorClass = 'loading';
                    break;
                default:
                    icon = '<i class="fas fa-question-circle"></i>';
            }
            
            element.innerHTML = `<span class="${colorClass}">${icon} ${message}</span>`;
        }
        
        // Test Firebase connection
        async function testFirebaseConnection() {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                updateStatus('connectionStatus', 'success', 'Connecté avec succès');
                updateProgress(25);
                return true;
            } catch (error) {
                console.error('Connection error:', error);
                updateStatus('connectionStatus', 'error', 'Erreur de connexion');
                return false;
            }
        }
        
        // Test Auth service
        async function testAuthService() {
            try {
                // Just check if auth is available
                if (auth) {
                    updateStatus('authStatus', 'success', 'Service Auth opérationnel');
                    updateProgress(50);
                    return true;
                }
                throw new Error('Auth not initialized');
            } catch (error) {
                updateStatus('authStatus', 'error', 'Service Auth indisponible');
                return false;
            }
        }
        
        // Test Database
        async function testDatabase() {
            try {
                // Try to write a test document
                const testRef = doc(db, '_test', 'connection_test');
                await setDoc(testRef, { timestamp: new Date().toISOString(), test: true });
                updateStatus('dbStatus', 'success', 'Firestore opérationnel');
                updateProgress(75);
                return true;
            } catch (error) {
                console.error('Database error:', error);
                updateStatus('dbStatus', 'error', 'Erreur Firestore: ' + error.message);
                return false;
            }
        }
        
        // Check if admin exists and create if not
        async function setupAdminAccount() {
            try {
                // Check if admin account exists
                const signInMethods = await fetchSignInMethodsForEmail(auth, ADMIN_EMAIL);
                
                if (signInMethods.length > 0) {
                    updateStatus('adminStatus', 'success', 'Compte admin déjà existant');
                    return { exists: true, message: 'Le compte administrateur existe déjà.' };
                }
                
                // Create admin account
                updateStatus('adminStatus', 'loading', 'Création du compte admin...');
                const userCredential = await createUserWithEmailAndPassword(auth, ADMIN_EMAIL, ADMIN_PASSWORD);
                
                // Store admin info in Firestore
                const adminRef = doc(db, 'admins', userCredential.user.uid);
                await setDoc(adminRef, {
                    email: ADMIN_EMAIL,
                    role: 'super_admin',
                    createdAt: new Date().toISOString(),
                    name: 'Administrateur Principal'
                });
                
                updateStatus('adminStatus', 'success', 'Compte admin créé avec succès');
                updateProgress(100);
                
                return { exists: false, message: 'Compte administrateur créé avec succès !', credentials: { email: ADMIN_EMAIL, password: ADMIN_PASSWORD } };
            } catch (error) {
                console.error('Admin setup error:', error);
                let errorMessage = 'Erreur lors de la création du compte admin';
                
                switch(error.code) {
                    case 'auth/email-already-exists':
                        errorMessage = 'L\'email existe déjà (configuration Firebase)';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'Mot de passe trop faible';
                        break;
                    case 'auth/operation-not-allowed':
                        errorMessage = 'Email/Password non activé dans Firebase Console';
                        break;
                    default:
                        errorMessage = error.message;
                }
                
                updateStatus('adminStatus', 'error', errorMessage);
                return { exists: false, error: errorMessage };
            }
        }
        
        // Main initialization function
        window.initializeFirebase = async function() {
            const btn = document.getElementById('initBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Initialisation en cours...';
            
            updateProgress(0);
            
            // Reset statuses
            updateStatus('connectionStatus', 'loading', 'Connexion...');
            updateStatus('authStatus', 'loading', 'Vérification...');
            updateStatus('dbStatus', 'loading', 'Vérification...');
            updateStatus('adminStatus', 'loading', 'Vérification...');
            
            const resultArea = document.getElementById('resultArea');
            
            try {
                // Step 1: Test connection
                const connected = await testFirebaseConnection();
                if (!connected) throw new Error('Cannot connect to Firebase');
                
                // Step 2: Test auth
                const authOk = await testAuthService();
                if (!authOk) throw new Error('Auth service not available');
                
                // Step 3: Test database
                const dbOk = await testDatabase();
                if (!dbOk) {
                    resultArea.innerHTML = `
                        <div class="info-box" style="background: #fef3c7; border-left-color: #f59e0b;">
                            <i class="fas fa-exclamation-triangle"></i>
                            <strong>Attention:</strong>
                            <p>La base de données Firestore n'est pas correctement configurée.</p>
                            <p>Veuillez activer Firestore dans la console Firebase:</p>
                            <ol style="margin-top: 10px; margin-left: 20px;">
                                <li>Allez sur <a href="https://console.firebase.google.com/project/medisoft-bd/firestore" target="_blank">Firebase Console</a></li>
                                <li>Cliquez sur "Créer une base de données"</li>
                                <li>Choisissez "Mode test" pour commencer</li>
                            </ol>
                        </div>
                    `;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-rocket"></i> Réessayer';
                    return;
                }
                
                // Step 4: Setup admin
                const adminResult = await setupAdminAccount();
                
                if (adminResult.error) {
                    resultArea.innerHTML = `
                        <div class="info-box" style="background: #fee2e2; border-left-color: #ef4444;">
                            <i class="fas fa-exclamation-circle"></i>
                            <strong>Erreur:</strong>
                            <p>${adminResult.error}</p>
                            <p style="margin-top: 10px;">Solution: Activez la méthode de connexion Email/Password dans la console Firebase:</p>
                            <ol style="margin-top: 10px; margin-left: 20px;">
                                <li>Allez sur <a href="https://console.firebase.google.com/project/medisoft-bd/authentication/providers" target="_blank">Authentication → Sign-in methods</a></li>
                                <li>Activez "Email/Password"</li>
                                <li>Cliquez sur "Enregistrer"</li>
                            </ol>
                        </div>
                    `;
                } else if (adminResult.exists) {
                    resultArea.innerHTML = `
                        <div class="info-box" style="background: #dcfce7; border-left-color: #10b981;">
                            <i class="fas fa-check-circle"></i>
                            <strong>Initialisation terminée !</strong>
                            <p>Le système est déjà configuré avec un compte administrateur.</p>
                            <div class="credentials">
                                <strong>📧 Email:</strong> ${ADMIN_EMAIL}<br>
                                <strong>🔒 Mot de passe:</strong> ${'•'.repeat(ADMIN_PASSWORD.length)}
                            </div>
                            <p style="margin-top: 10px;">
                                <a href="index.html" style="color: #00bcd4; text-decoration: none;">
                                    <i class="fas fa-arrow-right"></i> Retourner à l'accueil
                                </a>
                            </p>
                        </div>
                    `;
                } else {
                    resultArea.innerHTML = `
                        <div class="info-box" style="background: #dcfce7; border-left-color: #10b981;">
                            <i class="fas fa-check-circle"></i>
                            <strong>✅ Initialisation réussie !</strong>
                            <p>Le compte administrateur a été créé avec succès.</p>
                            <div class="credentials">
                                <strong>📧 Email:</strong> ${ADMIN_EMAIL}<br>
                                <strong>🔒 Mot de passe:</strong> ${ADMIN_PASSWORD}
                            </div>
                            <p style="margin-top: 10px; color: #ef4444;">
                                <i class="fas fa-lock"></i> <strong>Important:</strong> Notez ces identifiants en lieu sûr !
                            </p>
                            <p style="margin-top: 10px;">
                                <a href="index.html" style="color: #00bcd4; text-decoration: none;">
                                    <i class="fas fa-arrow-right"></i> Retourner à l'accueil
                                </a>
                            </p>
                        </div>
                    `;
                }
                
            } catch (error) {
                console.error('Initialization error:', error);
                resultArea.innerHTML = `
                    <div class="info-box" style="background: #fee2e2; border-left-color: #ef4444;">
                        <i class="fas fa-exclamation-circle"></i>
                        <strong>Erreur d'initialisation:</strong>
                        <p>${error.message}</p>
                        <p>Vérifiez votre connexion internet et réessayez.</p>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-rocket"></i> Initialiser Firebase';
            }
        };
        
        // Auto-run initialization on page load
        setTimeout(() => {
            initializeFirebase();
        }, 500);
    </script>
</body>
</html>
