<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initialisation Firebase - Medisoft Services</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a192f 0%, #1a3a5f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00bcd4, #008c9e);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .logo i {
            font-size: 40px;
            color: white;
        }
        
        h1 {
            color: #0a192f;
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-align: center;
        }
        
        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .status-card {
            background: #f8fafc;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .status-label {
            font-weight: 600;
            color: #0a192f;
        }
        
        .status-value {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .warning { color: #f59e0b; }
        .loading { color: #00bcd4; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,188,212,0.3);
            border-radius: 50%;
            border-top-color: #00bcd4;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn {
            background: linear-gradient(135deg, #00bcd4, #008c9e);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 20px;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,188,212,0.3);
        }
        
        .btn-secondary {
            background: #64748b;
            margin-top: 10px;
        }
        
        .info-box {
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }
        
        .info-box.error {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
        }
        
        .info-box.success {
            background: #dcfce7;
            border-left: 4px solid #10b981;
        }
        
        .info-box.warning {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
        }
        
        .info-box h4 {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .setup-guide {
            background: #f1f5f9;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .setup-guide h4 {
            color: #0a192f;
            margin-bottom: 15px;
        }
        
        .setup-guide ol {
            margin-left: 20px;
            line-height: 1.8;
        }
        
        .setup-guide a {
            color: #00bcd4;
            text-decoration: none;
        }
        
        .setup-guide a:hover {
            text-decoration: underline;
        }
        
        .credentials {
            background: #0a192f;
            color: white;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            font-family: monospace;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00bcd4, #008c9e);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .direct-link {
            display: inline-block;
            background: #00bcd4;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 10px;
            text-align: center;
        }
        
        .direct-link:hover {
            background: #008c9e;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }
        
        .firebase-console-btn {
            background: #4285f4;
        }
        
        .firebase-console-btn:hover {
            background: #3367d6;
        }
        
        .success-icon {
            font-size: 50px;
            color: #10b981;
            text-align: center;
            margin-bottom: 20px;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .bounce {
            animation: bounce 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1>Initialisation Firebase</h1>
        <p class="subtitle">Configuration automatique de l'espace administrateur</p>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="status-card">
            <div class="status-item">
                <span class="status-label">Firebase Connection</span>
                <span class="status-value" id="connectionStatus">⏳ Vérification...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Authentication Service</span>
                <span class="status-value" id="authStatus">⏳ Vérification...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Email/Password Method</span>
                <span class="status-value" id="methodStatus">⏳ Vérification...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Firestore Database</span>
                <span class="status-value" id="dbStatus">⏳ Vérification...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Admin Account</span>
                <span class="status-value" id="adminStatus">⏳ Vérification...</span>
            </div>
        </div>
        
        <div id="resultArea"></div>
        
        <div class="button-group">
            <button class="btn" id="initBtn" onclick="checkAndSetup()">
                <i class="fas fa-sync-alt"></i> Vérifier la configuration
            </button>
            
            <button class="btn firebase-console-btn" onclick="window.open('https://console.firebase.google.com/project/medisoft-bd/authentication/providers', '_blank')">
                <i class="fas fa-external-link-alt"></i> Activer Email/Password
            </button>
            
            <button class="btn firebase-console-btn" onclick="window.open('https://console.firebase.google.com/project/medisoft-bd/firestore', '_blank')">
                <i class="fas fa-database"></i> Activer Firestore
            </button>
            
            <button class="btn btn-secondary" onclick="window.open('index.html', '_self')">
                <i class="fas fa-home"></i> Retour à l'accueil
            </button>
        </div>
    </div>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC4lzLqXO2v0MWFQHdEw57KdX5el7e9Vu0",
            authDomain: "medisoft-bd.firebaseapp.com",
            projectId: "medisoft-bd",
            storageBucket: "medisoft-bd.firebasestorage.app",
            messagingSenderId: "845735954495",
            appId: "1:845735954495:web:9adc73d081a0f39d04d08a"
        };
        
        const ADMIN_EMAIL = "admin@medisoft.com";
        const ADMIN_PASSWORD = "Admin123456";
        
        let app, auth, db;
        
        function updateStatus(elementId, status, message) {
            const element = document.getElementById(elementId);
            if (!element) return;
            
            let icon = '';
            let colorClass = '';
            
            switch(status) {
                case 'success':
                    icon = '✅';
                    colorClass = 'success';
                    break;
                case 'error':
                    icon = '❌';
                    colorClass = 'error';
                    break;
                case 'warning':
                    icon = '⚠️';
                    colorClass = 'warning';
                    break;
                default:
                    icon = '⏳';
                    colorClass = 'loading';
            }
            
            element.innerHTML = `<span class="${colorClass}">${icon} ${message}</span>`;
        }
        
        function updateProgress(percent) {
            const fill = document.getElementById('progressFill');
            if (fill) fill.style.width = percent + '%';
        }
        
        async function testEmailPasswordMethod() {
            const testEmail = `test_${Date.now()}@temp.com`;
            const testPassword = "Test123456!";
            
            try {
                const result = await createUserWithEmailAndPassword(auth, testEmail, testPassword);
                if (result.user) {
                    await result.user.delete();
                }
                return { enabled: true, message: "Email/Password activé" };
            } catch (error) {
                console.log("Test error:", error.code);
                if (error.code === 'auth/operation-not-allowed') {
                    return { enabled: false, message: "Email/Password non activé", error: error.code };
                }
                if (error.code === 'auth/email-already-exists' || error.code === 'auth/weak-password') {
                    return { enabled: true, message: "Email/Password activé" };
                }
                return { enabled: false, message: error.message, error: error.code };
            }
        }
        
        async function initializeFirebase() {
            try {
                if (app) return true;
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                updateStatus('connectionStatus', 'success', 'Connecté avec succès');
                updateProgress(20);
                return true;
            } catch (error) {
                updateStatus('connectionStatus', 'error', 'Erreur de connexion: ' + error.message);
                return false;
            }
        }
        
        async function checkAuthService() {
            if (auth) {
                updateStatus('authStatus', 'success', 'Service Auth disponible');
                updateProgress(40);
                return true;
            }
            updateStatus('authStatus', 'error', 'Service Auth indisponible');
            return false;
        }
        
        async function checkFirestore() {
            try {
                // Try to access a collection to check if Firestore is enabled
                const testCollection = collection(db, 'partnership_messages');
                await getDocs(testCollection);
                updateStatus('dbStatus', 'success', 'Firestore opérationnel');
                updateProgress(80);
                return true;
            } catch (error) {
                console.error("Firestore error:", error);
                if (error.message.includes('Resource has been exhausted')) {
                    updateStatus('dbStatus', 'warning', 'Firestore existe mais requête limitée');
                    return true;
                }
                updateStatus('dbStatus', 'error', 'Firestore non configuré');
                return false;
            }
        }
        
        async function setupAdmin() {
            try {
                const signInMethods = await fetchSignInMethodsForEmail(auth, ADMIN_EMAIL);
                
                if (signInMethods.length > 0) {
                    updateStatus('adminStatus', 'success', 'Compte admin existant');
                    return { exists: true };
                }
                
                updateStatus('adminStatus', 'loading', 'Création du compte admin...');
                const userCredential = await createUserWithEmailAndPassword(auth, ADMIN_EMAIL, ADMIN_PASSWORD);
                
                try {
                    const adminRef = doc(db, 'admins', userCredential.user.uid);
                    await setDoc(adminRef, {
                        email: ADMIN_EMAIL,
                        role: 'super_admin',
                        createdAt: new Date().toISOString(),
                        name: 'Administrateur Principal'
                    });
                } catch (e) {
                    console.warn("Could not save admin to Firestore:", e);
                }
                
                updateStatus('adminStatus', 'success', 'Compte admin créé');
                updateProgress(100);
                return { exists: false, created: true };
            } catch (error) {
                console.error("Admin setup error:", error);
                updateStatus('adminStatus', 'error', error.message);
                return { error: error.code, message: error.message };
            }
        }
        
        window.checkAndSetup = async function() {
            const resultArea = document.getElementById('resultArea');
            const btn = document.getElementById('initBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Vérification en cours...';
            
            updateProgress(0);
            
            updateStatus('connectionStatus', 'loading', 'Connexion...');
            updateStatus('authStatus', 'loading', 'Vérification...');
            updateStatus('methodStatus', 'loading', 'Vérification...');
            updateStatus('dbStatus', 'loading', 'Vérification...');
            updateStatus('adminStatus', 'loading', 'Vérification...');
            
            try {
                const initOk = await initializeFirebase();
                if (!initOk) throw new Error("Firebase initialization failed");
                
                await checkAuthService();
                
                const methodCheck = await testEmailPasswordMethod();
                if (!methodCheck.enabled) {
                    updateStatus('methodStatus', 'error', 'Email/Password non activé');
                    resultArea.innerHTML = `
                        <div class="info-box error">
                            <h4><i class="fas fa-exclamation-triangle"></i> ⚠️ Configuration requise</h4>
                            <p><strong>Erreur:</strong> La méthode de connexion Email/Password n'est pas activée.</p>
                            <p>C'est la raison pour laquelle la page reste bloquée en chargement.</p>
                        </div>
                        
                        <div class="setup-guide">
                            <h4><i class="fas fa-cog"></i> 📋 Solution (1 minute)</h4>
                            <ol>
                                <li>Cliquez sur le bouton <strong style="color:#00bcd4">"Activer Email/Password"</strong> ci-dessus</li>
                                <li>Dans Firebase Console, allez dans <strong>Authentication → Sign-in methods</strong></li>
                                <li>Activez <strong>Email/Password</strong> (toggle button)</li>
                                <li>Cliquez sur <strong>Enregistrer</strong></li>
                                <li>Revenez ici et cliquez sur <strong>"Vérifier la configuration"</strong></li>
                            </ol>
                            <div style="margin-top: 15px; background: #fff3cd; padding: 10px; border-radius: 8px;">
                                <strong>💡 Astuce:</strong> Si vous ne voyez pas l'option, vérifiez que vous êtes connecté au bon compte Google.
                            </div>
                        </div>
                    `;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sync-alt"></i> Vérifier la configuration';
                    return;
                }
                
                updateStatus('methodStatus', 'success', 'Email/Password activé ✓');
                updateProgress(60);
                
                await checkFirestore();
                
                const adminResult = await setupAdmin();
                
                if (adminResult.exists) {
                    resultArea.innerHTML = `
                        <div class="info-box success">
                            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
                            <h4><i class="fas fa-check-circle"></i> ✅ Configuration terminée !</h4>
                            <p>Firebase est correctement configuré avec un compte administrateur.</p>
                            <div class="credentials">
                                <strong>📧 Email:</strong> ${ADMIN_EMAIL}<br>
                                <strong>🔒 Mot de passe:</strong> ${ADMIN_PASSWORD}
                            </div>
                            <p style="margin-top: 15px;">
                                <a href="index.html" style="color: #00bcd4; font-weight: bold;">→ Cliquez ici pour accéder à l'application</a>
                            </p>
                        </div>
                    `;
                } else if (adminResult.created) {
                    resultArea.innerHTML = `
                        <div class="info-box success">
                            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
                            <h4><i class="fas fa-check-circle"></i> ✅ Initialisation réussie !</h4>
                            <p>Le compte administrateur a été créé avec succès.</p>
                            <div class="credentials">
                                <strong>📧 Email:</strong> ${ADMIN_EMAIL}<br>
                                <strong>🔒 Mot de passe:</strong> ${ADMIN_PASSWORD}
                            </div>
                            <p style="margin-top: 15px; background: #fee2e2; padding: 10px; border-radius: 8px;">
                                <i class="fas fa-lock"></i> <strong>Important:</strong> Notez ces identifiants en lieu sûr !
                            </p>
                            <p style="margin-top: 15px;">
                                <a href="index.html" style="color: #00bcd4; font-weight: bold;">→ Cliquez ici pour accéder à l'application</a>
                            </p>
                        </div>
                    `;
                }
                
            } catch (error) {
                console.error("Check error:", error);
                resultArea.innerHTML = `
                    <div class="info-box error">
                        <h4><i class="fas fa-exclamation-circle"></i> Erreur</h4>
                        <p>${error.message}</p>
                        <p>Vérifiez votre connexion internet et réessayez.</p>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sync-alt"></i> Vérifier la configuration';
            }
        };
        
        // Auto-check on load with delay
        setTimeout(() => {
            checkAndSetup();
        }, 1000);
    </script>
</body>
</html>
