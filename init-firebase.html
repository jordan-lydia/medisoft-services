<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initialisation Firebase - Medisoft Services</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a192f 0%, #1a3a5f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00bcd4, #008c9e);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .logo i {
            font-size: 40px;
            color: white;
        }
        
        h1 {
            color: #0a192f;
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-align: center;
        }
        
        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .status-card {
            background: #f8fafc;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .status-label {
            font-weight: 600;
            color: #0a192f;
        }
        
        .status-value {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .warning { color: #f59e0b; }
        .info { color: #3b82f6; }
        .loading { color: #00bcd4; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,188,212,0.3);
            border-radius: 50%;
            border-top-color: #00bcd4;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn {
            background: linear-gradient(135deg, #00bcd4, #008c9e);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 20px;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,188,212,0.3);
        }
        
        .btn-secondary {
            background: #64748b;
            margin-top: 10px;
        }
        
        .btn-success {
            background: #10b981;
        }
        
        .info-box {
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }
        
        .info-box.success {
            background: #dcfce7;
            border-left: 4px solid #10b981;
        }
        
        .info-box.error {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
        }
        
        .info-box.warning {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
        }
        
        .info-box.info {
            background: #e0f2fe;
            border-left: 4px solid #3b82f6;
        }
        
        .info-box h4 {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .credentials {
            background: #0a192f;
            color: white;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            font-family: monospace;
            text-align: center;
        }
        
        .credentials p {
            margin: 5px 0;
        }
        
        .copy-btn {
            background: #00bcd4;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
            font-size: 0.8rem;
        }
        
        .copy-btn:hover {
            background: #008c9e;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00bcd4, #008c9e);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .direct-link {
            display: inline-block;
            background: #00bcd4;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 10px;
            text-align: center;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .button-group .btn {
            margin-top: 0;
            flex: 1;
        }
        
        .test-login {
            background: #f1f5f9;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .test-login input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1>Initialisation Firebase</h1>
        <p class="subtitle">Configuration automatique de l'espace administrateur</p>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="status-card">
            <div class="status-item">
                <span class="status-label">Firebase Connection</span>
                <span class="status-value" id="connectionStatus">⏳ Vérification...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Authentication Service</span>
                <span class="status-value" id="authStatus">⏳ Vérification...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Email/Password Method</span>
                <span class="status-value" id="methodStatus">⏳ Vérification...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Firestore Database</span>
                <span class="status-value" id="dbStatus">⏳ Vérification...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Admin Account</span>
                <span class="status-value" id="adminStatus">⏳ Vérification...</span>
            </div>
        </div>
        
        <div id="resultArea"></div>
        
        <div class="button-group">
            <button class="btn" id="initBtn" onclick="checkAndSetup()">
                <i class="fas fa-sync-alt"></i> Vérifier
            </button>
            <button class="btn btn-secondary" onclick="window.open('https://console.firebase.google.com/project/medisoft-bd/authentication/providers', '_blank')">
                <i class="fas fa-external-link-alt"></i> Firebase Console
            </button>
        </div>
        
        <button class="btn btn-success" onclick="goToAdminPanel()" style="background: #10b981;">
            <i class="fas fa-sign-in-alt"></i> Accéder à l'espace Admin
        </button>
    </div>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, fetchSignInMethodsForEmail, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC4lzLqXO2v0MWFQHdEw57KdX5el7e9Vu0",
            authDomain: "medisoft-bd.firebaseapp.com",
            projectId: "medisoft-bd",
            storageBucket: "medisoft-bd.firebasestorage.app",
            messagingSenderId: "845735954495",
            appId: "1:845735954495:web:9adc73d081a0f39d04d08a"
        };
        
        const ADMIN_EMAIL = "admin@medisoft.com";
        const ADMIN_PASSWORD = "Admin123456";
        
        let app, auth, db;
        
        function updateStatus(elementId, status, message) {
            const element = document.getElementById(elementId);
            if (!element) return;
            
            let icon = '';
            let colorClass = '';
            
            switch(status) {
                case 'success':
                    icon = '✅';
                    colorClass = 'success';
                    break;
                case 'error':
                    icon = '❌';
                    colorClass = 'error';
                    break;
                case 'warning':
                    icon = '⚠️';
                    colorClass = 'warning';
                    break;
                case 'info':
                    icon = 'ℹ️';
                    colorClass = 'info';
                    break;
                default:
                    icon = '⏳';
                    colorClass = 'loading';
            }
            
            element.innerHTML = `<span class="${colorClass}">${icon} ${message}</span>`;
        }
        
        function updateProgress(percent) {
            const fill = document.getElementById('progressFill');
            if (fill) fill.style.width = percent + '%';
        }
        
        async function initializeFirebase() {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                updateStatus('connectionStatus', 'success', 'Connecté avec succès');
                updateProgress(20);
                return true;
            } catch (error) {
                updateStatus('connectionStatus', 'error', 'Erreur de connexion: ' + error.message);
                return false;
            }
        }
        
        async function checkAuthService() {
            if (auth) {
                updateStatus('authStatus', 'success', 'Service Auth disponible');
                updateProgress(40);
                return true;
            }
            updateStatus('authStatus', 'error', 'Service Auth indisponible');
            return false;
        }
        
        async function testEmailPasswordMethod() {
            try {
                const testEmail = `test_${Date.now()}@temp.com`;
                const testPassword = "Test123456!";
                const result = await createUserWithEmailAndPassword(auth, testEmail, testPassword);
                if (result.user) {
                    await result.user.delete();
                }
                updateStatus('methodStatus', 'success', 'Email/Password activé');
                updateProgress(60);
                return { enabled: true };
            } catch (error) {
                if (error.code === 'auth/operation-not-allowed') {
                    updateStatus('methodStatus', 'error', 'Email/Password non activé');
                    return { enabled: false, error: error.code };
                }
                if (error.code === 'auth/email-already-in-use') {
                    updateStatus('methodStatus', 'success', 'Email/Password activé');
                    updateProgress(60);
                    return { enabled: true };
                }
                updateStatus('methodStatus', 'warning', 'Test: ' + error.message);
                return { enabled: true };
            }
        }
        
        async function checkFirestore() {
            try {
                const testRef = doc(db, '_test', 'connection_test');
                await setDoc(testRef, { timestamp: new Date().toISOString(), test: true });
                updateStatus('dbStatus', 'success', 'Firestore opérationnel');
                updateProgress(80);
                return true;
            } catch (error) {
                updateStatus('dbStatus', 'error', 'Firestore non configuré');
                return false;
            }
        }
        
        async function setupOrCheckAdmin() {
            try {
                // Check if admin exists
                const signInMethods = await fetchSignInMethodsForEmail(auth, ADMIN_EMAIL);
                
                if (signInMethods.length > 0) {
                    updateStatus('adminStatus', 'success', 'Compte admin existant');
                    updateProgress(100);
                    return { exists: true, message: 'Le compte administrateur existe déjà.' };
                }
                
                // Create admin account
                updateStatus('adminStatus', 'loading', 'Création du compte admin...');
                const userCredential = await createUserWithEmailAndPassword(auth, ADMIN_EMAIL, ADMIN_PASSWORD);
                
                // Store admin info in Firestore
                const adminRef = doc(db, 'admins', userCredential.user.uid);
                await setDoc(adminRef, {
                    email: ADMIN_EMAIL,
                    role: 'super_admin',
                    createdAt: new Date().toISOString(),
                    name: 'Administrateur Principal'
                });
                
                updateStatus('adminStatus', 'success', 'Compte admin créé');
                updateProgress(100);
                return { exists: false, created: true, message: 'Compte administrateur créé avec succès !' };
                
            } catch (error) {
                console.error("Admin setup error:", error);
                
                // Handle email already in use error
                if (error.code === 'auth/email-already-in-use') {
                    updateStatus('adminStatus', 'success', 'Compte admin déjà existant');
                    updateProgress(100);
                    return { exists: true, message: 'Le compte administrateur existe déjà (email déjà utilisé).' };
                }
                
                updateStatus('adminStatus', 'error', error.message);
                return { error: error.code, message: error.message };
            }
        }
        
        window.checkAndSetup = async function() {
            const resultArea = document.getElementById('resultArea');
            const btn = document.getElementById('initBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Vérification en cours...';
            
            updateProgress(0);
            
            // Reset statuses
            updateStatus('connectionStatus', 'loading', 'Connexion...');
            updateStatus('authStatus', 'loading', 'Vérification...');
            updateStatus('methodStatus', 'loading', 'Vérification...');
            updateStatus('dbStatus', 'loading', 'Vérification...');
            updateStatus('adminStatus', 'loading', 'Vérification...');
            
            try {
                // Step 1: Initialize Firebase
                const initOk = await initializeFirebase();
                if (!initOk) throw new Error("Firebase initialization failed");
                
                // Step 2: Check Auth
                await checkAuthService();
                
                // Step 3: Check Email/Password Method
                const methodCheck = await testEmailPasswordMethod();
                if (!methodCheck.enabled) {
                    resultArea.innerHTML = `
                        <div class="info-box error">
                            <h4><i class="fas fa-exclamation-triangle"></i> Configuration requise</h4>
                            <p><strong>Erreur:</strong> La méthode de connexion Email/Password n'est pas activée.</p>
                        </div>
                        <div class="info-box info">
                            <h4><i class="fas fa-cog"></i> 📋 Procédure d'activation</h4>
                            <ol style="margin-left: 20px; line-height: 1.8;">
                                <li>Cliquez sur <strong>"Firebase Console"</strong></li>
                                <li>Allez dans <strong>Authentication → Sign-in methods</strong></li>
                                <li>Activez <strong>Email/Password</strong></li>
                                <li>Cliquez sur <strong>Enregistrer</strong></li>
                            </ol>
                        </div>
                    `;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sync-alt"></i> Vérifier';
                    return;
                }
                
                // Step 4: Check Firestore
                await checkFirestore();
                
                // Step 5: Setup Admin
                const adminResult = await setupOrCheckAdmin();
                
                if (adminResult.exists) {
                    resultArea.innerHTML = `
                        <div class="info-box success">
                            <h4><i class="fas fa-check-circle"></i> ✅ Configuration terminée !</h4>
                            <p>${adminResult.message}</p>
                            <div class="credentials">
                                <p><strong>📧 Email:</strong> ${ADMIN_EMAIL}</p>
                                <p><strong>🔒 Mot de passe:</strong> ${ADMIN_PASSWORD}</p>
                                <button class="copy-btn" onclick="copyCredentials()">📋 Copier les identifiants</button>
                            </div>
                            <p style="margin-top: 15px; color: #10b981;">
                                <i class="fas fa-check"></i> Vous pouvez maintenant vous connecter à l'espace admin !
                            </p>
                        </div>
                    `;
                } else if (adminResult.created) {
                    resultArea.innerHTML = `
                        <div class="info-box success">
                            <h4><i class="fas fa-check-circle"></i> ✅ Initialisation réussie !</h4>
                            <p>${adminResult.message}</p>
                            <div class="credentials">
                                <p><strong>📧 Email:</strong> ${ADMIN_EMAIL}</p>
                                <p><strong>🔒 Mot de passe:</strong> ${ADMIN_PASSWORD}</p>
                                <button class="copy-btn" onclick="copyCredentials()">📋 Copier les identifiants</button>
                            </div>
                            <p style="margin-top: 15px; color: #ef4444;">
                                <i class="fas fa-lock"></i> <strong>Important:</strong> Notez ces identifiants en lieu sûr !
                            </p>
                        </div>
                    `;
                } else if (adminResult.error) {
                    resultArea.innerHTML = `
                        <div class="info-box error">
                            <h4><i class="fas fa-exclamation-circle"></i> Erreur</h4>
                            <p>${adminResult.message}</p>
                        </div>
                    `;
                }
                
            } catch (error) {
                console.error("Check error:", error);
                resultArea.innerHTML = `
                    <div class="info-box error">
                        <h4><i class="fas fa-exclamation-circle"></i> Erreur</h4>
                        <p>${error.message}</p>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sync-alt"></i> Vérifier';
            }
        };
        
        window.goToAdminPanel = function() {
            window.location.href = 'index.html';
        };
        
        window.copyCredentials = function() {
            const credentials = `Email: ${ADMIN_EMAIL}\nMot de passe: ${ADMIN_PASSWORD}`;
            navigator.clipboard.writeText(credentials).then(() => {
                alert('Identifiants copiés dans le presse-papier !');
            });
        };
        
        // Auto-check on load
        setTimeout(() => {
            checkAndSetup();
        }, 500);
    </script>
</body>
</html>
