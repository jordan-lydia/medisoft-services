<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Medisoft Services | Partenariat & Demandes de Contrat</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .back-home-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.95);
            color: #667eea;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .back-home-btn:hover {
            transform: translateY(-3px);
            background: white;
        }

        .partnership-card {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .form-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .form-header h1 i {
            margin-right: 12px;
        }

        .badge-24h {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.85rem;
            margin-top: 18px;
        }

        .form-tabs {
            display: flex;
            background: #f8fafc;
            border-bottom: 2px solid #e2edf7;
        }

        .form-tab {
            flex: 1;
            padding: 16px 20px;
            text-align: center;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: #4a5b6e;
            font-family: 'Poppins', sans-serif;
        }

        .form-tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            background: white;
        }

        .form-panel {
            display: none;
            padding: 35px 40px;
            background: white;
        }

        .form-panel.active {
            display: block;
            animation: fadeSlideUp 0.4s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #1e2a3e;
            margin-bottom: 8px;
        }

        .required {
            color: #e53e3e;
            margin-left: 4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input[type="file"] {
            padding: 10px 12px;
            background: #f8fafc;
            border: 2px dashed #667eea;
            cursor: pointer;
        }

        small {
            display: block;
            margin-top: 8px;
            color: #6c7a8e;
            font-size: 0.75rem;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -8px rgba(102, 126, 234, 0.5);
        }

        .submit-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .notification {
            position: fixed;
            top: 24px;
            right: 24px;
            background: white;
            padding: 14px 24px;
            border-radius: 60px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(450px);
            transition: transform 0.3s;
            z-index: 1000;
            border-left: 5px solid #667eea;
        }

        .notification.show {
            transform: translateX(0);
        }

        .footer-note {
            background: #f9fcff;
            padding: 20px 30px;
            text-align: center;
            border-top: 1px solid #e9f0f5;
            font-size: 0.8rem;
            color: #5c6e82;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 700px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .form-panel {
                padding: 25px 20px;
            }
            .form-header h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

<a href="index.html" class="back-home-btn">
    <i class="fas fa-arrow-left"></i>
    <span>Retour à l'accueil</span>
</a>

<div class="partnership-card">
    <div class="form-header">
        <h1><i class="fas fa-handshake"></i> Partenariat & Demandes de Contrat</h1>
        <p>Soumettez votre projet - Réponse sous 24h</p>
        <div class="badge-24h">
            <i class="far fa-clock"></i> Service professionnel
        </div>
    </div>

    <div class="form-tabs">
        <button class="form-tab active" onclick="switchFormTab('partnership')">
            <i class="fas fa-chalkboard-user"></i> Demande de Partenariat
        </button>
        <button class="form-tab" onclick="switchFormTab('contract')">
            <i class="fas fa-file-signature"></i> Demande de Contrat
        </button>
    </div>

    <!-- PANEL PARTENARIAT -->
    <div id="partnershipForm" class="form-panel active">
        <form id="partnershipFormElement">
            <div class="form-row">
                <div class="form-group">
                    <label>Nom complet <span class="required">*</span></label>
                    <input type="text" id="part_fullname" placeholder="Votre nom et prénom" required>
                </div>
                <div class="form-group">
                    <label>Entreprise <span class="required">*</span></label>
                    <input type="text" id="part_company" placeholder="Nom de votre entreprise" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" id="part_email" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label>Téléphone <span class="required">*</span></label>
                    <input type="tel" id="part_phone" placeholder="+243 XXX XXX XXX" required>
                </div>
            </div>

            <div class="form-group">
                <label>Type de partenariat <span class="required">*</span></label>
                <select id="part_type" required>
                    <option value="">Sélectionnez...</option>
                    <option value="Partenariat Technique">Partenariat Technique</option>
                    <option value="Partenariat Commercial">Partenariat Commercial</option>
                    <option value="Partenariat Stratégique">Partenariat Stratégique</option>
                </select>
            </div>

            <div class="form-group">
                <label>Description <span class="required">*</span></label>
                <textarea id="part_description" rows="4" placeholder="Décrivez votre projet..." required></textarea>
            </div>

            <div class="form-group">
                <label>Document PDF <span class="required">*</span></label>
                <input type="file" id="part_document" accept=".pdf" required>
                <small>Format PDF max 10MB</small>
            </div>

            <button type="button" class="submit-btn" onclick="submitForm('partnership')">
                <i class="fas fa-paper-plane"></i> Envoyer la demande
            </button>
        </form>
    </div>

    <!-- PANEL CONTRAT -->
    <div id="contractForm" class="form-panel">
        <form id="contractFormElement">
            <div class="form-row">
                <div class="form-group">
                    <label>Nom complet <span class="required">*</span></label>
                    <input type="text" id="cont_fullname" placeholder="Votre nom et prénom" required>
                </div>
                <div class="form-group">
                    <label>Entreprise <span class="required">*</span></label>
                    <input type="text" id="cont_company" placeholder="Nom de votre entreprise" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" id="cont_email" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label>Téléphone <span class="required">*</span></label>
                    <input type="tel" id="cont_phone" placeholder="+243 XXX XXX XXX" required>
                </div>
            </div>

            <div class="form-group">
                <label>Type de contrat <span class="required">*</span></label>
                <select id="cont_type" required>
                    <option value="">Sélectionnez...</option>
                    <option value="Contrat de prestation">Contrat de prestation</option>
                    <option value="Contrat de maintenance">Contrat de maintenance</option>
                    <option value="Contrat de développement">Contrat de développement</option>
                </select>
            </div>

            <div class="form-group">
                <label>Description <span class="required">*</span></label>
                <textarea id="cont_description" rows="4" placeholder="Décrivez votre demande..." required></textarea>
            </div>

            <div class="form-group">
                <label>Document PDF <span class="required">*</span></label>
                <input type="file" id="cont_document" accept=".pdf" required>
                <small>Format PDF max 10MB</small>
            </div>

            <button type="button" class="submit-btn" onclick="submitForm('contract')">
                <i class="fas fa-file-signature"></i> Envoyer la demande
            </button>
        </form>
    </div>

    <div class="footer-note">
        <i class="fas fa-lock"></i> Vos informations sont sécurisées
    </div>
</div>

<div id="notification" class="notification">
    <i id="notifIcon" class="fas fa-check-circle"></i>
    <span id="notifMessage">Message</span>
</div>

<script>
    // Configuration - Utilisation d'un service de redirection email gratuit
    // ⚠️ IMPORTANT: Pour que ça fonctionne, vous devez:
    // 1. Aller sur https://formspree.io/
    // 2. Créer un compte gratuit
    // 3. Créer un nouveau formulaire
    // 4. Copier l'ID du formulaire (ex: xyzabc123)
    // 5. Remplacer "VOTRE_FORMSPREE_ID" ci-dessous
    
    const FORMSPREE_ID = "VOTRE_FORMSPREE_ID"; // ← REMPLACEZ PAR VOTRE ID FORMSFREE
    
    // Alternative: Utiliser un service de redirection email gratuit sans inscription
    // Vous pouvez aussi utiliser: https://formsubmit.co/medisoftservice01@gmail.com
    const FALLBACK_ENDPOINT = "https://formsubmit.co/ajax/medisoftservice01@gmail.com";
    
    function showNotification(message, isError = false) {
        const notification = document.getElementById('notification');
        const notifIcon = document.getElementById('notifIcon');
        const notifMessage = document.getElementById('notifMessage');
        
        notifMessage.textContent = message;
        notifIcon.className = isError ? "fas fa-exclamation-circle" : "fas fa-check-circle";
        notification.style.borderLeftColor = isError ? "#e53e3e" : "#667eea";
        notification.classList.add('show');
        
        setTimeout(() => notification.classList.remove('show'), 5000);
    }
    
    function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }
    
    async function submitForm(type) {
        // Récupération des valeurs selon le type
        let fullname, company, email, phone, requestType, description, file;
        
        if (type === 'partnership') {
            fullname = document.getElementById('part_fullname').value.trim();
            company = document.getElementById('part_company').value.trim();
            email = document.getElementById('part_email').value.trim();
            phone = document.getElementById('part_phone').value.trim();
            requestType = document.getElementById('part_type').value;
            description = document.getElementById('part_description').value.trim();
            file = document.getElementById('part_document').files[0];
        } else {
            fullname = document.getElementById('cont_fullname').value.trim();
            company = document.getElementById('cont_company').value.trim();
            email = document.getElementById('cont_email').value.trim();
            phone = document.getElementById('cont_phone').value.trim();
            requestType = document.getElementById('cont_type').value;
            description = document.getElementById('cont_description').value.trim();
            file = document.getElementById('cont_document').files[0];
        }
        
        // Validations
        if (!fullname || !company || !email || !phone || !requestType || !description) {
            showNotification("❌ Veuillez remplir tous les champs", true);
            return;
        }
        
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showNotification("❌ Email invalide", true);
            return;
        }
        
        if (!file || file.type !== 'application/pdf') {
            showNotification("❌ Veuillez joindre un fichier PDF", true);
            return;
        }
        
        if (file.size > 10 * 1024 * 1024) {
            showNotification("❌ Fichier trop volumineux (max 10 Mo)", true);
            return;
        }
        
        const btn = event.target;
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<div class="loader"></div> Envoi...';
        
        try {
            const fileBase64 = await readFileAsBase64(file);
            const date = new Date().toLocaleString('fr-FR');
            const typeLabel = type === 'partnership' ? 'Demande de Partenariat' : 'Demande de Contrat';
            
            // Construction du corps de l'email
            const emailBody = `
                <h2>📋 ${typeLabel}</h2>
                <p><strong>Nom:</strong> ${fullname}</p>
                <p><strong>Entreprise:</strong> ${company}</p>
                <p><strong>Email:</strong> ${email}</p>
                <p><strong>Téléphone:</strong> ${phone}</p>
                <p><strong>Type:</strong> ${requestType}</p>
                <p><strong>Description:</strong><br>${description.replace(/\n/g, '<br>')}</p>
                <p><strong>Document:</strong> ${file.name}</p>
                <p><strong>Date:</strong> ${date}</p>
            `;
            
            // Envoi via FormSubmit.co (gratuit, sans inscription)
            const formData = new FormData();
            formData.append('_subject', `${typeLabel} - ${fullname} - ${company}`);
            formData.append('_replyto', email);
            formData.append('message', emailBody);
            formData.append('_template', 'table');
            
            // Ajout des destinataires
            formData.append('_cc', 'medisoftservices01@gmail.com');
            
            // Envoi
            const response = await fetch(FALLBACK_ENDPOINT, {
                method: 'POST',
                body: formData
            });
            
            if (response.ok) {
                showNotification("✅ Demande envoyée avec succès ! Réponse sous 24h.");
                
                // Réinitialisation
                if (type === 'partnership') {
                    document.getElementById('partnershipFormElement').reset();
                } else {
                    document.getElementById('contractFormElement').reset();
                }
            } else {
                throw new Error("Erreur d'envoi");
            }
            
        } catch (error) {
            console.error(error);
            showNotification("❌ Erreur d'envoi. Veuillez réessayer ou nous contacter directement.", true);
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }
    
    function switchFormTab(tab) {
        const partnershipPanel = document.getElementById('partnershipForm');
        const contractPanel = document.getElementById('contractForm');
        const tabs = document.querySelectorAll('.form-tab');
        
        tabs.forEach(btn => btn.classList.remove('active'));
        
        if (tab === 'partnership') {
            partnershipPanel.classList.add('active');
            contractPanel.classList.remove('active');
            tabs[0].classList.add('active');
        } else {
            partnershipPanel.classList.remove('active');
            contractPanel.classList.add('active');
            tabs[1].classList.add('active');
        }
    }
    
    window.switchFormTab = switchFormTab;
    window.submitForm = submitForm;
    
    console.log("🚀 Formulaire chargé - Utilisation de FormSubmit.co");
</script>
</body>
</html>
